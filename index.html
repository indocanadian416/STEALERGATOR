<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEALERGATOR // Enterprise Threat Intel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap');
        :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --accent: #38bdf8; --success: #10b981; --text-main: #f8fafc; --text-dim: #94a3b8; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .intel-card { background-color: var(--card); border: 1px solid var(--border); transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1); height: 285px; display: flex; flex-direction: column; }
        .intel-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.8); }
        #sys-log { background: #020617; color: var(--success); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 14px; border-radius: 10px; border: 1px solid var(--border); height: 120px; overflow-y: auto; line-height: 1.6; }
        .tag { font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
        .rel-3 { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.5); }
        .rel-2 { background: rgba(56, 189, 248, 0.2); color: var(--accent); border: 1px solid rgba(56, 189, 248, 0.5); }
        .ref-badge { background: #6366f1; color: #fff; font-size: 8px; padding: 1px 6px; border-radius: 3px; font-weight: 900; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen antialiased">

    <div class="max-w-7xl mx-auto px-6 py-10">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 pb-8 border-b border-slate-700">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white flex items-center gap-3 uppercase">
                    <i class="fas fa-microchip text-sky-400"></i>STEALERGATOR
                </h1>
                <p class="text-[10px] text-slate-500 mt-2 mono uppercase tracking-[0.25em]">Cloud & Endpoint Intelligence Radar</p>
            </div>
            <div class="flex gap-6 mt-6 md:mt-0 items-center">
                <div class="bg-slate-800/60 border border-slate-700 px-6 py-3 rounded-xl text-right shadow-inner">
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest leading-none">Relevant Threats</p>
                    <p id="match-count" class="text-2xl font-black text-sky-400 leading-none mt-2">0</p>
                </div>
                <button onclick="startIntelHunt()" class="bg-sky-500 hover:bg-sky-400 text-slate-950 px-8 py-4 rounded-xl text-xs font-black transition-all flex items-center gap-3 shadow-xl active:scale-95">
                    <i class="fas fa-satellite-dish" id="scan-icon"></i> RUN GLOBAL SCAN
                </button>
            </div>
        </header>

        <div class="mb-10">
            <div class="flex justify-between items-center mb-3 px-1">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest flex items-center gap-2"><i class="fas fa-terminal"></i> Intel Pipeline</p>
                <div class="flex items-center gap-4">
                    <span class="text-[10px] text-slate-500 mono uppercase tracking-tight">Audit: April 2026 Dataset Active</span>
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                </div>
            </div>
            <div id="sys-log">System Standby. Wiz Cloud + 18 Global research streams mapped...</div>
        </div>

        <div id="intel-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-32 border border-dashed border-slate-700 rounded-3xl bg-slate-800/30">
            <i class="fas fa-filter text-slate-800 text-6xl mb-6"></i>
            <p class="text-slate-400 font-bold text-lg mono uppercase text-center">No Tier 2 or Tier 3 Hits found<br><span class="text-slate-600 text-xs">Awaiting verified technical broadcasts...</span></p>
        </div>

        <footer class="mt-20 pt-10 border-t border-slate-800 flex justify-center items-center">
            <div class="text-sm font-bold text-slate-400 italic bg-slate-800/50 px-8 py-2 rounded-full border border-slate-700 shadow-sm">Created by Pratik</div>
        </footer>
    </div>

    <script>
        // --- MULTI-VECTOR CONFIG ---
        const T1_TYPE = ["stealer", "infostealer", "rat", "trojan", "loader", "backdoor", "botnet", "cloud stealer", "token stealer"];
        const T2_FAM = ["Remus", "Lumma", "Vidar", "RedLine", "Stealc", "Atomic", "Rhadamanthys", "Raccoon", "OtterCookie", "AsyncRAT", "Remcos", "Quasar", "XWorm", "Formbook", "Agent Tesla", "Sectop", "ClearFake", "Void Stealer", "Storm"];
        const T3_CTX = ["variant", "campaign", "IOC", "analysis", "report", "active", "C2", "Azure token", "npm supply chain", "supply-chain", "Cloud Threats"];

        const SOURCES = [
            { name: 'Wiz Cloud Research', url: 'https://www.wiz.io/api/feed/cloud-threat-landscape/rss.xml' },
            { name: 'InfoStealers.com', url: 'https://www.infostealers.com/rss-feed/' },
            { name: 'SANS ISC', url: 'https://isc.sans.edu/rssfeed.xml' },
            { name: 'Mandiant Research', url: 'https://www.mandiant.com/resources/blog/rss.xml' },
            { name: 'Unit42 Palo Alto', url: 'https://unit42.paloaltonetworks.com/feed/' },
            { name: 'ThreatFox IoCs', url: 'https://threatfox.abuse.ch/export/json/recent/' },
            { name: 'CheckPoint Research', url: 'https://research.checkpoint.com/feed/' },
            { name: 'AhnLab ASEC', url: 'https://asec.ahnlab.com/en/feed/' },
            { name: 'BleepingComputer', url: 'https://www.bleepingcomputer.com/feed/' },
            { name: 'TheHackerNews', url: 'https://feeds.feedburner.com/TheHackersNews' },
            { name: 'SentinelOne Research', url: 'https://www.sentinelone.com/blog/rss/' },
            { name: 'Trend Micro Intelligence', url: 'https://www.trendmicro.com/vinfo/gb/security/news/cybercrime-and-digital-threats/rss' },
            { name: 'Malwarebytes Labs', url: 'https://www.malwarebytes.com/blog/feed' }
        ];

        // --- MANUALLY VERIFIED STABLE PERMALINKS (APRIL 2026) ---
        const OFFLINE_INTEL = [
            { title: "Breaking: Vercel Breach Linked to Lumma Infection at Context.ai", desc: "Hudson Rock identifies the point of origin for the Vercel breach: a single Lumma infection on a developer's machine exfiltrated Supabase and Google Workspace keys.", link: "https://www.infostealers.com/article/breaking-vercel-breach-linked-to-infostealer-infection-at-context-ai/", date: "2026-04-20", source: "InfoStealers.com", score: 3, offline: true },
            { title: "Storm Infostealer: Remote Decryption Logic to Evade EDR", desc: "Infosecurity Magazine details 'Storm', a 2026 stealer that sends encrypted browser databases to C2 servers to bypass local process memory detection.", link: "https://www.infosecurity-magazine.com/news/storm-infostealer-remotely/", date: "2026-04-01", source: "Infosecurity Magazine", score: 3, offline: true },
            { title: "Cloud Threats Retrospective 2026: Identity & Token Theft Trends", desc: "Wiz Research report on systemic weaknesses and how identity artifacts like session tokens have become the primary objective for cloud threat actors.", link: "https://www.wiz.io/reports/cloud-threat-retrospective-2026", date: "2026-04-15", source: "Wiz Research", score: 3, offline: true },
            { title: "Inside the Coinbase Cartel: How Infostealer Credentials Fueled Ransomware", desc: "Deep dive into how specialized stealer logs are being used by the 'Coinbase Cartel' to target over 100 high-value financial companies.", link: "https://www.infostealers.com/article/inside-the-coinbase-cartel-how-infostealer-credentials-fueled-a-100-company-ransomware-spree/", date: "2026-04-27", source: "InfoStealers.com", score: 3, offline: true },
            { title: "AsyncRAT 2026: Analysis, Evolution, and Defense Strategies", desc: "Lumu research on the geopolitical weaponization of AsyncRAT in 2026, targeting financial sectors in Latin America and North American infrastructure.", link: "https://lumu.io/blog/asyncrat-2026-analysis-evolution-defense/", date: "2026-02-04", source: "Lumu Blog", score: 2, offline: true },
            { title: "From Stealers to Systems: The New Model of Managed Credential Theft", desc: "Trend Micro examines how infostealer operations have evolved into managed systems connecting collection, analysis, and monetization.", link: "https://www.trendmicro.com/vinfo/gb/security/news/cybercrime-and-digital-threats/from-stealers-to-systems-the-new-model-of-credential-theft", date: "2026-04-21", source: "Trend Micro", score: 3, offline: true }
        ];

        const PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';

        function log(msg, err = false) {
            const l = document.getElementById('sys-log');
            const d = document.createElement('div');
            d.style.color = err ? '#f87171' : '#34d399';
            d.innerHTML = `<span style="color:#475569;">[${new Date().toLocaleTimeString()}]</span> > ${msg}`;
            l.appendChild(d);
            l.scrollTop = l.scrollHeight;
        }

        async function fetchWithTimeout(resource, options = { timeout: 4500 }) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), options.timeout);
            try {
                const response = await fetch(resource, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (e) {
                clearTimeout(id);
                throw e;
            }
        }

        async function startIntelHunt() {
            const icon = document.getElementById('scan-icon');
            const grid = document.getElementById('intel-grid');
            const count = document.getElementById('match-count');
            
            icon.classList.add('fa-spin');
            grid.innerHTML = '';
            log("Executing Parallel Ingestion (Verified 2026 Pipeline)...");

            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - 30); 

            let masterList = [];

            const fetchPromises = SOURCES.map(src => {
                const url = src.name === 'ThreatFox IoCs' ? 'https://api.allorigins.win/raw?url=' + encodeURIComponent(src.url) : PROXY + encodeURIComponent(src.url);
                return fetchWithTimeout(url)
                    .then(r => r.json())
                    .then(data => ({ name: src.name, data }))
                    .catch(() => ({ name: src.name, error: true }));
            });

            const results = await Promise.allSettled(fetchPromises);

            results.forEach(res => {
                if (res.status === 'fulfilled' && !res.value.error) {
                    const items = res.value.data.items || (res.value.data.data ? res.value.data.data : []);
                    items.forEach(item => {
                        const date = new Date(item.pubDate || item.last_seen || item.first_seen);
                        if (date >= cutoff) {
                            const title = item.title || `IOC: ${item.malware_printable}`;
                            const desc = item.description || item.ioc || "";
                            const intel = analyze(title, desc);
                            
                            // FILTER: Hide Score 1 (Discovery). Only display 2 (Correlated) and 3 (High Relevance).
                            if (intel.score > 1) {
                                masterList.push({
                                    title: title,
                                    link: item.link || `https://threatfox.abuse.ch/ioc/${item.id}/`,
                                    desc: desc.replace(/<[^>]*>?/gm, '').substring(0, 160),
                                    date: date,
                                    source: res.value.name,
                                    score: intel.score
                                });
                            }
                        }
                    });
                    log(`Synced: ${res.value.name}`);
                } else if (res.status === 'fulfilled' && res.value.error) {
                    log(`Bypassed: ${res.value.name}`, true);
                }
            });

            // Inject Stable Offline Reference Intelligence (Verified 2026 Links)
            OFFLINE_INTEL.forEach(fb => { if (new Date(fb.date) >= cutoff && fb.score > 1) masterList.push(fb); });

            const unique = Array.from(new Set(masterList.map(a => a.title)))
                .map(title => masterList.find(a => a.title === title))
                .sort((a, b) => b.score - a.score || new Date(b.date) - new Date(a.date));

            count.textContent = unique.length;
            if (unique.length === 0) document.getElementById('empty-state').classList.remove('hidden');
            else render(unique);
            
            icon.classList.remove('fa-spin');
            log(`Scan Complete. Verified ${unique.length} technical reports.`);
        }

        function analyze(title, desc) {
            const text = (title + " " + desc).toLowerCase();
            const familyMatch = T2_FAM.find(f => text.includes(f.toLowerCase()));
            if (!familyMatch) return { score: 0 };
            const typeMatch = T1_TYPE.some(t => text.includes(t.toLowerCase()));
            const contextMatch = T3_CTX.some(c => text.includes(c.toLowerCase()));
            
            if (typeMatch && contextMatch) return { score: 3 }; 
            if (typeMatch || contextMatch) return { score: 2 };
            return { score: 1 }; 
        }

        function render(data) {
            const grid = document.getElementById('intel-grid');
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'intel-card p-6 rounded-2xl flex flex-col shadow-xl';
                const tagClass = item.score === 3 ? 'rel-3' : 'rel-2';
                const label = item.score === 3 ? 'High Relevance' : 'Relevant';

                card.innerHTML = `
                    <div class="flex-grow">
                        <div class="flex justify-between items-center mb-5">
                            <span class="tag ${tagClass}">${label}</span>
                            <div class="flex items-center gap-2">
                                ${item.offline ? '<span class="ref-badge">REFERENCE</span>' : ''}
                                <span class="text-[10px] text-slate-500 mono font-bold">${new Date(item.date).toLocaleDateString()}</span>
                            </div>
                        </div>
                        <h3 class="text-[15px] font-extrabold text-slate-50 mb-3 leading-tight tracking-tight">
                            <a href="${item.link}" target="_blank" class="hover:text-sky-400 transition-colors line-clamp-2">${item.title}</a>
                        </h3>
                        <p class="text-[11px] text-slate-400 leading-relaxed line-clamp-4">${item.desc}...</p>
                    </div>
                    <div class="flex items-center justify-between border-t border-slate-700/50 pt-5 mt-4">
                        <div class="flex flex-col"><span class="text-[8px] text-slate-600 font-black uppercase tracking-tight">Provider</span><span class="text-[10px] text-slate-400 font-bold">${item.source.substring(0, 24)}</span></div>
                        <a href="${item.link}" target="_blank" class="text-[11px] font-black text-sky-400 uppercase tracking-tighter hover:border-sky-400 transition-all border-b-2 border-sky-900/50 pb-0.5">Analyze →</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        window.onload = startIntelHunt;
    </script>
</body>
</html>
